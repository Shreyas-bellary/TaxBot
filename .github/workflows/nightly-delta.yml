name: Nightly Delta Ingestion

on:
  # schedule:
  #   - cron: "0 0 * * *"  # 00:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-delta
  cancel-in-progress: false

jobs:
  delta:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry==2.4.1

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --without dev

      - name: Apply migrations
        env:
          TAXBOT_POSTGRES_DSN: ${{ secrets.TAXBOT_POSTGRES_DSN }}
          TAXBOT_SUPABASE_URL: ${{ secrets.TAXBOT_SUPABASE_URL }}
          TAXBOT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TAXBOT_SUPABASE_SERVICE_ROLE_KEY }}
          TAXBOT_UNSTRUCTURED_API_KEY: ${{ secrets.TAXBOT_UNSTRUCTURED_API_KEY }}
          TAXBOT_HUGGINGFACE_API_TOKEN: ${{ secrets.TAXBOT_HUGGINGFACE_API_TOKEN }}
          TAXBOT_GEMINI_API_KEY: ${{ secrets.TAXBOT_GEMINI_API_KEY }}
          TAXBOT_OPENROUTER_API_KEY: ${{ secrets.TAXBOT_OPENROUTER_API_KEY }}
        run: poetry run taxbot-migrate

      - name: Delta ingestion
        env:
          TAXBOT_POSTGRES_DSN: ${{ secrets.TAXBOT_POSTGRES_DSN }}
          TAXBOT_SUPABASE_URL: ${{ secrets.TAXBOT_SUPABASE_URL }}
          TAXBOT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TAXBOT_SUPABASE_SERVICE_ROLE_KEY }}
          TAXBOT_UNSTRUCTURED_API_KEY: ${{ secrets.TAXBOT_UNSTRUCTURED_API_KEY }}
          TAXBOT_HUGGINGFACE_API_TOKEN: ${{ secrets.TAXBOT_HUGGINGFACE_API_TOKEN }}
          TAXBOT_GEMINI_API_KEY: ${{ secrets.TAXBOT_GEMINI_API_KEY }}
          TAXBOT_OPENROUTER_API_KEY: ${{ secrets.TAXBOT_OPENROUTER_API_KEY }}
        run: poetry run taxbot-delta
