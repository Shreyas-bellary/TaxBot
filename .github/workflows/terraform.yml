name: Terraform

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  plan-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_qdrant_url: ${{ vars.TAXBOT_QDRANT_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Initialize
        run: terraform init

      - name: Check formatting
        run: terraform fmt -check

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan -lock-timeout=5m -out=tfplan

      - name: Apply
        run: terraform apply -lock-timeout=5m -auto-approve tfplan
