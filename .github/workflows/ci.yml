name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: taxbot
          POSTGRES_PASSWORD: taxbot
          POSTGRES_DB: taxbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taxbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry==2.4.1

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check src tests

      - name: Mypy
        run: poetry run mypy src

      - name: Apply migrations
        env:
          TAXBOT_POSTGRES_DSN: postgresql://taxbot:taxbot@localhost:5432/taxbot
          TAXBOT_UNSTRUCTURED_API_KEY: ci-fake-unstructured-key
          TAXBOT_HUGGINGFACE_API_TOKEN: ci-fake-hf-token
          TAXBOT_GEMINI_API_KEY: ci-fake-gemini-key
        run: poetry run taxbot-migrate

      - name: Pytest
        env:
          TAXBOT_POSTGRES_DSN: postgresql://taxbot:taxbot@localhost:5432/taxbot
          TAXBOT_SUPABASE_URL: https://example.supabase.co
          TAXBOT_SUPABASE_SERVICE_ROLE_KEY: ci-fake-service-role-key
          TAXBOT_UNSTRUCTURED_API_KEY: ci-fake-unstructured-key
          TAXBOT_HUGGINGFACE_API_TOKEN: ci-fake-hf-token
          TAXBOT_GEMINI_API_KEY: ci-fake-gemini-key
        run: poetry run pytest -q
