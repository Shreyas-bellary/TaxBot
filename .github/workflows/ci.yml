name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: taxbot
          POSTGRES_PASSWORD: taxbot
          POSTGRES_DB: taxbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taxbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry==2.4.1

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check src tests

      - name: Mypy
        run: poetry run mypy src

      - name: Apply migrations
        env:
          TAXBOT_POSTGRES_DSN: postgresql://taxbot:taxbot@localhost:5432/taxbot
        run: poetry run taxbot-migrate

      - name: Pytest
        env:
          TAXBOT_POSTGRES_DSN: postgresql://taxbot:taxbot@localhost:5432/taxbot
          TAXBOT_UNSTRUCTURED_API_KEY: ci-fake-unstructured-key
          TAXBOT_HUGGINGFACE_API_TOKEN: ci-fake-hf-token
          TAXBOT_GEMINI_API_KEY: ci-fake-gemini-key
        run: poetry run pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: Production build
        env:
          VITE_API_BASE_URL: ""
        run: npm run build

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Check formatting
        run: terraform fmt -check -recursive infra

      - name: Validate bootstrap
        working-directory: infra/bootstrap
        run: terraform init -backend=false && terraform validate

      - name: Validate runtime
        working-directory: infra/terraform
        run: terraform init -backend=false && terraform validate

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: taxbot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan production image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: taxbot:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
