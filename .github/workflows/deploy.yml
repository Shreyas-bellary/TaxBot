name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      SERVICE: taxbot
      MIGRATION_JOB: taxbot-migrate
      DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/taxbot
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_qdrant_url: ${{ vars.TAXBOT_QDRANT_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate Terraform identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Reconcile production infrastructure
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -lock-timeout=5m -auto-approve

      - name: Authenticate deployment identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Apply database migrations
        env:
          IMAGE: ${{ env.DOCKERHUB_IMAGE }}:${{ github.event.workflow_run.head_sha }}
        run: |
          gcloud run jobs update "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --quiet
          gcloud run jobs execute "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait \
            --quiet

      - name: Deploy Cloud Run revision
        env:
          IMAGE: ${{ env.DOCKERHUB_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          REVISION: ${{ github.event.workflow_run.head_sha }}
        run: |
          gcloud run services update "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --update-labels="commit-sha=${REVISION}" \
            --quiet

      - name: Smoke test public service
        run: |
          SERVICE_URL="$(
            gcloud run services describe "${SERVICE}" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --format='value(status.url)'
          )"
          echo "Waiting for TaxBot to serve ${SERVICE_URL}/readyz (cold starts can take several minutes)"
          deadline=$(($(date +%s) + 300))
          until curl --fail --silent --show-error "${SERVICE_URL}/readyz" >/dev/null; do
            if (( $(date +%s) >= deadline )); then
              echo "Timed out after 300s waiting for /readyz" >&2
              gcloud run revisions list "${SERVICE}" \
                --project="${PROJECT_ID}" \
                --region="${REGION}" \
                --limit=5
              exit 1
            fi
            echo "Not ready yet; retrying in 10s..."
            sleep 10
          done
          echo "/readyz OK"
          curl --fail --silent --show-error \
            "${SERVICE_URL}/" >/dev/null
          echo "Deployed ${SERVICE_URL}"
