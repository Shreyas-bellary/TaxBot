<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TaxBot — a grounded AI assistant for U.S. tax questions, answering only from official IRS documents."
    />
    <title>TaxBot — IRS Tax Assistant</title>
    <script>
      // Apply theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var pref = localStorage.getItem("taxbot.theme.v1");
          var dark =
            pref === "dark" ||
            ((pref === null || pref === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
